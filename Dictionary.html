<!DOCTYPE html>
<html>
<head>
    <title>Dictionary Lab</title>
</head>
<body>

    <h2>Multimedia Dictionary</h2>

    <select id="menu" onchange="showText()">
        <option value="">-- Select --</option>
        <option value="Dog" data-s="The dog barked very loud.">Dog</option>
        <option value="Food" data-s="My favorite food is mac n cheese.">Food</option>
        <option value="Sun" data-s="The sun is very hot.">Sun</option>
        <option value="Car" data-s="Lamborghini is a fast car.">Car</option>
        <option value="Book" data-s="My favorite book is Harry Potter.">Book</option>
    </select>

    <button onclick="say(document.getElementById('menu').value)">Speak Word</button>

    <br><br>

    <textarea id="box" rows="3" cols="40" readonly></textarea>
    <button onclick="say(document.getElementById('box').value)">Speak Sentence</button>

    <script>
        // Simple speech function
        function say(txt) {
            if (txt == "") {
                alert("Nothing to say!");
            } else {
                var msg = new SpeechSynthesisUtterance(txt);
                window.speechSynthesis.speak(msg);
            }
        }

        // Updates the box when a word is picked
        function showText() {
            var menu = document.getElementById("menu");
            var box = document.getElementById("box");
            
            if (menu.selectedIndex > 0) {
                var info = menu.options[menu.selectedIndex];
                box.value = info.getAttribute("data-s");
            } else {
                box.value = "";
            }
        }
    </script>

</body>
</html>
